<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: page.name | replace: "_", " " | replace: ".md", "" }} | TeenBook</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
            background: #f8f9fa;
            line-height: 1.6;
        }
        .article {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        h1 {
            color: #2c3e50;
            border-bottom: 2px solid #667eea;
            padding-bottom: 0.5rem;
        }
        .back-link {
            display: inline-block;
            margin-top: 2rem;
            color: #667eea;
            text-decoration: none;
        }
        footer {
            margin-top: 2rem;
            text-align: center;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="article">
        {{ content }}
    </div>
    <footer>
        <a href="{{ '/' | relative_url }}" class="back-link">← На главную</a>
        <p>TeenBook — энциклопедия знаний</p>
    </footer>
</body>
</html>
